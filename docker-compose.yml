version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rankme}:${POSTGRES_PASSWORD:-rankme}@db:5432/${POSTGRES_DB:-rankme}
      - AI_SERVICE_URL=http://ai:8000
      - RANKME_ENGINE=${RANKME_ENGINE:-similarity_v1}
    depends_on:
      db:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai:
    build:
      context: .
      dockerfile: ai/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RANKME_ENGINE=${RANKME_ENGINE:-similarity_v1}
      - MODEL_PATH=/models
    volumes:
      - ./models:/models
      - ./training-data:/training-data
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rankme}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rankme}
      POSTGRES_DB: ${POSTGRES_DB:-rankme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankme"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
